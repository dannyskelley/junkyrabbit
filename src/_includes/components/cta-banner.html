<!--                 CTA Banner                   -->
<!-- ============================================ -->

<style>
#cta-banner-jr {
    background: var(--primary);
    padding: 4rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
}
#cta-banner-jr::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('/assets/images/hero-movers.webp');
    background-size: cover;
    background-position: center;
    opacity: 0.07;
}
@media (max-width: 640px) {
    #cta-banner-jr::before {
        background-image: url('/assets/images/hero-movers-640.webp');
    }
}
#cta-banner-jr .cta-inner {
    max-width: 50rem;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}
#cta-banner-jr h2 {
    font-family: "Darumadrop One", Arial, sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: #0d1a08;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 0.75rem;
}
#cta-banner-jr p {
    font-size: 1rem;
    color: #1a3d0e;
    margin-bottom: 2rem;
    line-height: 1.6;
    font-weight: 600;
}
#cta-banner-jr .cta-btns {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
}
#cta-banner-jr .cta-btn-dark {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--cta);
    color: #0d1a08;
    font-size: 1.05rem;
    font-weight: 900;
    padding: 0.95rem 2.25rem;
    border-radius: 4px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.2s;
}
#cta-banner-jr .cta-btn-dark:hover {
    background: var(--ctaHover);
    transform: translateY(-2px);
}
#cta-banner-jr .cta-btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    color: #0d1a08;
    font-size: 1.05rem;
    font-weight: 900;
    padding: 0.95rem 2.25rem;
    border-radius: 4px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: 2.5px solid #0d1a08;
    transition: background 0.2s;
}
#cta-banner-jr .cta-btn-outline:hover {
    background: #0d1a08;
    color: var(--primary);
}
@media (max-width: 36rem) {
    #cta-banner-jr .cta-btns {
        flex-direction: column;
        align-items: stretch;
    }
    #cta-banner-jr .cta-btn-dark,
    #cta-banner-jr .cta-btn-outline {
        width: 100%;
        justify-content: center;
        padding: 0.9rem 1rem;
        font-size: 0.95rem;
    }
}
#cta-banner-jr .cta-social-badges {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1.5rem;
    flex-wrap: nowrap;
}
#cta-banner-jr .cta-social-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.9rem;
    background: rgba(13,26,8,0.1);
    border: 1px solid rgba(13,26,8,0.22);
    border-radius: 100px;
    color: #0d1a08;
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.02em;
    white-space: nowrap;
    transition: background 0.2s;
}
#cta-banner-jr .cta-social-badge:hover { background: rgba(13,26,8,0.18); }
#cta-banner-jr .cta-social-badge .badge-stars { color: #2D7A1A; letter-spacing: 0.01em; }
</style>

        <h2>Available Today. Book Now.</h2>

        </div>
        <div class="cta-social-badges">

            </a>

                <svg width="15" height="15" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <rect width="60" height="60" rx="12" fill="#8DB600"/>

        </div>
    </div>
</section>
