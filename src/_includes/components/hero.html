<!--                    Hero                      -->

<style>
#hero-jr {
    background-color: #111;
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Very dark overlay over the photo — nearly invisible bg so it reads as solid dark */
#hero-jr .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}
#hero-jr .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: right top;
    display: block;
}
#hero-jr .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
        100deg,
        rgba(13,26,8,0.97) 0%,
        rgba(13,26,8,0.92) 50%,
        rgba(13,26,8,0.7) 100%
    );
}

#hero-jr .hero-container {
    position: relative;
    z-index: 2;
    max-width: 68rem;
    margin: 0 auto;
    width: 100%;
    padding: 5rem 1.25rem 1.75rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.85rem;
    flex: 1;
    justify-content: center;
}

/* Top label */
#hero-jr .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 800;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.14em;
}
#hero-jr .hero-label::before {
    content: '';
    display: block;
    width: 24px;
    height: 2px;
    background: var(--primary);
    flex-shrink: 0;
}

/* Headline */
#hero-jr h1 {
    font-family: "Darumadrop One", Arial, sans-serif;
    font-size: clamp(2.3rem, 7.2vw, 4.75rem);
    line-height: 0.98;
    color: #ffffff;
    text-transform: uppercase;
    margin: 0;
    max-width: 14ch;
}
#hero-jr h1 .accent {
    color: var(--primary);
    display: block;
}

/* Subtext */
#hero-jr .hero-sub {
    font-size: clamp(0.95rem, 1.7vw, 1.05rem);
    color: rgba(255,255,255,0.78);
    max-width: 33rem;
    line-height: 1.5;
    margin: 0;
}

/* Trust PILL badges */
#hero-jr .trust-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-top: 0.1rem;
}
#hero-jr .trust-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.8rem;
    border: 1.5px solid rgba(255,255,255,0.28);
    border-radius: 100px;
    background: transparent;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
}
#hero-jr .trust-pill:hover {
    border-color: var(--primary);
    color: var(--primary);
}
#hero-jr .trust-pill svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    opacity: 0.85;
}

/* CTA group */
#hero-jr .hero-cta-group {
    display: flex;
    flex-direction: row;
    gap: 0.6rem;
    width: 100%;
    max-width: 26rem;
    margin-top: 0.25rem;
    flex-wrap: wrap;
}
#hero-jr .hero-btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: var(--cta);
    color: #0d1a08;
    font-weight: 900;
    font-size: 0.95rem;
    padding: 0.9rem 1.4rem;
    border-radius: 4px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.2s;
    flex: 1 1 auto;
    box-sizing: border-box;
    min-width: 9rem;
}
#hero-jr .hero-btn-primary:hover {
    background: var(--ctaHover);
    transform: translateY(-2px);
}
#hero-jr .hero-btn-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: rgba(255,255,255,0.92);
    font-size: 1rem;
    font-weight: 900;
    text-decoration: none;
    flex: 1 1 auto;
    padding: 0.75rem 1rem;
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    box-sizing: border-box;
    transition: border-color 0.2s, color 0.2s;
    min-width: 9rem;
}
#hero-jr .hero-btn-call:hover {
    border-color: var(--primary);
    color: var(--primary);
}
#hero-jr .hero-btn-call svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

/* Short-height safety: keep CTAs above the fold on small phones / landscape */
@media (max-height: 700px) {
    #hero-jr .hero-container {
        padding-top: 4.25rem;
        padding-bottom: 1rem;
        gap: 0.65rem;
    }
    #hero-jr h1 {
        font-size: clamp(2rem, 6.5vw, 4rem);
    }
    #hero-jr .hero-sub {
        font-size: 0.9rem;
        line-height: 1.45;
    }
    #hero-jr .trust-pills {
        gap: 0.4rem;
    }
    #hero-jr .trust-pill {
        padding: 0.4rem 0.7rem;
        font-size: 0.75rem;
    }
}

/* Desktop: side-by-side layout */
@media (min-width: 50rem) {
    #hero-jr {
        min-height: 100svh;
    }
    #hero-jr .hero-container {
        padding: 7rem 2.5rem 3rem;
        max-width: 60%;
        min-height: 80vh;
        gap: 1.1rem;
    }
    #hero-jr .hero-cta-group {
        max-width: none;
    }
    #hero-jr .hero-btn-primary {
        flex: 0 1 auto;
        min-width: 13rem;
        font-size: 1rem;
        padding: 1.05rem 1.75rem;
    }
    #hero-jr .hero-btn-call {
        flex: 0 1 auto;
        min-width: 11rem;
        font-size: 1.1rem;
        padding: 0.9rem 1.25rem;
    }
}

/* Very tall desktop: keep proportions calm */
@media (min-width: 50rem) and (min-height: 800px) {
    #hero-jr .hero-container {
        padding-top: 9rem;
    }
}
</style>
