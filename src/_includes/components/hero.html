<!--                    Hero                      -->

<style>
#hero-jr {
    background-color: #111;
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Very dark overlay over the photo — nearly invisible bg so it reads as solid dark */
#hero-jr .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}
#hero-jr .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: right top;
    display: block;
}
#hero-jr .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
        100deg,
        rgba(13,26,8,0.97) 0%,
        rgba(13,26,8,0.92) 50%,
        rgba(13,26,8,0.7) 100%
    );
}

#hero-jr .hero-container {
    position: relative;
    z-index: 2;
    max-width: 68rem;
    margin: 0 auto;
    width: 100%;
    padding: 7rem 1.4rem 3.5rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1.4rem;
    flex: 1;
}

/* Top label */
#hero-jr .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    font-weight: 800;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.15em;
}
#hero-jr .hero-label::before {
    content: '';
    display: block;
    width: 28px;
    height: 2px;
    background: var(--primary);
    flex-shrink: 0;
}

/* Headline */
#hero-jr h1 {
    font-family: "Darumadrop One", Arial, sans-serif;
    font-size: clamp(2.8rem, 9.5vw, 6.5rem);
    line-height: 0.95;
    color: #ffffff;
    text-transform: uppercase;
    margin: 0;
    max-width: 14ch;
}
#hero-jr h1 .accent {
    color: var(--primary);
    display: block;
}

/* Subtext */
#hero-jr .hero-sub {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    color: rgba(255,255,255,0.65);
    max-width: 33rem;
    line-height: 1.7;
    margin: 0;
}

/* Trust PILL badges — like the reference */
#hero-jr .trust-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem;
    margin-top: 0.25rem;
}
#hero-jr .trust-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.6rem 1rem;
    border: 1.5px solid rgba(255,255,255,0.28);
    border-radius: 100px;
    background: transparent;
    color: #fff;
    font-size: 0.82rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
}
#hero-jr .trust-pill:hover {
    border-color: var(--primary);
    color: var(--primary);
}
#hero-jr .trust-pill svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    opacity: 0.85;
}

/* CTA group */
#hero-jr .hero-cta-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    max-width: 22rem;
    margin-top: 0.5rem;
}
#hero-jr .hero-btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: var(--cta);
    color: #fff;
    font-weight: 900;
    font-size: 1rem;
    padding: 1.1rem 1.75rem;
    border-radius: 4px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: background 0.2s, transform 0.2s;
    width: 100%;
    box-sizing: border-box;
}
#hero-jr .hero-btn-primary:hover {
    background: var(--ctaHover);
    transform: translateY(-2px);
}
#hero-jr .hero-btn-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    color: rgba(255,255,255,0.88);
    font-size: 1.15rem;
    font-weight: 900;
    text-decoration: none;
    width: 100%;
    padding: 0.85rem;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    box-sizing: border-box;
    transition: border-color 0.2s, color 0.2s;
}
#hero-jr .hero-btn-call:hover {
    border-color: var(--primary);
    color: var(--primary);
}
#hero-jr .hero-btn-call svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

/* Photo strip at bottom */
#hero-jr .hero-photo-strip {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 4px;
    margin-top: auto;
    max-height: 200px;
    overflow: hidden;
}
#hero-jr .hero-photo-strip img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
}
#hero-jr .hero-photo-strip img:first-child {
    object-position: center center;
}
#hero-jr .hero-photo-strip img:last-child {
    object-position: right center;
}

/* Desktop: side-by-side layout */
@media (min-width: 50rem) {
    #hero-jr {
        min-height: 100svh;
    }
    #hero-jr .hero-container {
        padding: 12rem 2.5rem 6rem;
        max-width: 50%;
        min-height: 80vh;
        justify-content: center;
    }
    #hero-jr .hero-photo-strip {
        display: none;
    }
    #hero-jr .hero-cta-group {
        flex-direction: row;
        max-width: none;
        flex-wrap: wrap;
    }
    #hero-jr .hero-btn-primary {
        width: auto;
        min-width: 13rem;
    }
    #hero-jr .hero-btn-call {
        width: auto;
        min-width: 11rem;
    }
}
</style>
