<!--                    Hero                      -->
<!-- ============================================ -->

<style>
#hero-jr {
    background-color: #111;
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Very dark overlay over the photo — nearly invisible bg so it reads as solid dark */
#hero-jr .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}
#hero-jr .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: right top;
    display: block;
}
#hero-jr .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
        /* Base: uniform dark tint for the moody branded look */
        linear-gradient(rgba(13,26,8,0.52), rgba(13,26,8,0.52)),
        /* Top: heavier dark band for nav */
        linear-gradient(to bottom, rgba(13,26,8,0.60) 0%, transparent 36%),
        /* Bottom: dark originates from bottom-right, bottom-left stays lighter */
        linear-gradient(to top left, rgba(13,26,8,0.97) 0%, rgba(13,26,8,0.75) 22%, transparent 55%),
        /* Left panel: very light touch — just enough for text, not face */
        linear-gradient(90deg, rgba(13,26,8,0.30) 0%, rgba(13,26,8,0.15) 28%, transparent 52%),
        /* Subtle center radial for depth */
        radial-gradient(ellipse 55% 40% at 55% 52%, rgba(13,26,8,0.20) 0%, transparent 100%);
}

#hero-jr .hero-container {
    position: relative;
    z-index: 2;
    max-width: 68rem;
    margin: 0 auto;
    width: 100%;
    padding: 5rem 1.25rem 1.75rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.85rem;
    flex: 1;
    justify-content: center;
}


/* Headline */
#hero-jr h1 {
    font-family: "Darumadrop One", Arial, sans-serif;
    font-size: clamp(2.3rem, 7.2vw, 4.75rem);
    line-height: 0.98;
    color: #ffffff;
    text-transform: uppercase;
    margin: 0;
    max-width: 14ch;
    text-shadow: 0 2px 16px rgba(13,26,8,0.95), 0 0 40px rgba(13,26,8,0.90), 0 0 80px rgba(13,26,8,0.75);
}
#hero-jr h1 .accent {
    color: var(--primary);
    display: block;
}

/* Subtext */
#hero-jr .hero-sub {
    font-size: clamp(1.1rem, 2.5vw, 1.25rem);
    color: rgba(255,255,255,0.78);
    max-width: 36rem;
    line-height: 1.55;
    margin: 0;
    text-shadow: 0 1px 12px rgba(13,26,8,0.9);
}

/* Trust PILL badges */
#hero-jr .trust-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-top: 0.1rem;
}
#hero-jr .trust-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.8rem;
    background: transparent;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    transition: color 0.2s;
}
#hero-jr .trust-pill:hover {
    color: var(--primary);
}
#hero-jr .trust-pill svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    opacity: 0.85;
}

/* CTA group */
#hero-jr .hero-cta-group {
    display: flex;
    flex-direction: row;
    gap: 0.6rem;
    width: 100%;
    max-width: 26rem;
    margin-top: 0.25rem;
    flex-wrap: wrap;
}
#hero-jr .hero-btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: var(--cta);
    color: #0d1a08;
    font-weight: 900;
    font-size: 0.95rem;
    padding: 0.9rem 1.4rem;
    border-radius: 4px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.2s;
    flex: 1 1 auto;
    box-sizing: border-box;
    min-width: 9rem;
}
#hero-jr .hero-btn-primary:hover {
    background: var(--ctaHover);
    transform: translateY(-2px);
}
#hero-jr .hero-btn-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: rgba(255,255,255,0.92);
    font-size: 1rem;
    font-weight: 900;
    text-decoration: none;
    flex: 1 1 auto;
    padding: 0.75rem 1rem;
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    box-sizing: border-box;
    transition: border-color 0.2s, color 0.2s;
    min-width: 9rem;
}
#hero-jr .hero-btn-call:hover {
    border-color: var(--primary);
    color: var(--primary);
}
#hero-jr .hero-btn-call svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

/* Platform social proof strip */
#hero-jr .hero-platforms {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: nowrap;
    margin-top: 0.25rem;
}
#hero-jr .hero-platform-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.85rem;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 100px;
    color: rgba(255,255,255,0.88);
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.02em;
    white-space: nowrap;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
}
#hero-jr .hero-platform-badge:hover {
    background: rgba(255,255,255,0.16);
    border-color: var(--primary);
    color: #fff;
}
#hero-jr .hero-platform-badge svg {
    flex-shrink: 0;
}
#hero-jr .hero-platform-badge .badge-stars {
    color: var(--primary);
    letter-spacing: 0.01em;
}

/* Short-height safety: keep CTAs above the fold on small phones / landscape */
@media (max-height: 700px) {
    #hero-jr .hero-container {
        padding-top: 4.25rem;
        padding-bottom: 1rem;
        gap: 0.65rem;
    }
    #hero-jr h1 {
        font-size: clamp(2rem, 6.5vw, 4rem);
    }
    #hero-jr .hero-sub {
        font-size: 1rem;
        line-height: 1.5;
    }
    #hero-jr .trust-pills {
        gap: 0.4rem;
    }
    #hero-jr .trust-pill {
        padding: 0.4rem 0.7rem;
        font-size: 0.75rem;
    }
}

/* Desktop: side-by-side layout */
@media (min-width: 37rem) {
    #hero-jr .trust-pills {
        flex-wrap: nowrap;
    }
}
@media (min-width: 50rem) {
    #hero-jr {
        min-height: 100svh;
    }
    #hero-jr .hero-container {
        padding: 7rem 2.5rem 3rem;
        max-width: 60%;
        min-height: 80vh;
        gap: 1.1rem;
    }
    #hero-jr .hero-cta-group {
        max-width: none;
    }
    #hero-jr .hero-btn-primary {
        flex: 0 1 auto;
        min-width: 13rem;
        font-size: 1rem;
        padding: 1.05rem 1.75rem;
    }
    #hero-jr .hero-btn-call {
        flex: 0 1 auto;
        min-width: 11rem;
        font-size: 1.1rem;
        padding: 0.9rem 1.25rem;
    }
}

/* Very tall desktop: keep proportions calm */
@media (min-width: 50rem) and (min-height: 800px) {
    #hero-jr .hero-container {
        padding-top: 9rem;
    }
}
</style>
